version: "2"

# NEVER remove linters from this file. Fix the code instead.

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck     # includes gosimple rules (merged in golangci-lint v2)
    - unused
    - ineffassign
    - gocritic
    - cyclop
    - nestif
    - funlen
    - gocognit
    - prealloc
    - errorlint
    - wrapcheck
    - noctx
    - gosec
    - bodyclose

  settings:
    funlen:
      lines: 80
    cyclop:
      max-complexity: 15
    nestif:
      min-complexity: 5
