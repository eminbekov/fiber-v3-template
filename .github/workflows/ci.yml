name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:18.3-alpine3.23
        env:
          POSTGRES_DB: fiber_template
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiber_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.6.2-alpine3.23
        options: >-
          --health-cmd "redis-cli -a redis_password ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
          redis-server --requirepass redis_password
        ports:
          - 6379:6379
      nats:
        image: nats:2.12.6-alpine
        ports:
          - 4222:4222
    env:
      ENVIRONMENT: development
      LOG_LEVEL: info
      HTTP_LISTEN_ADDRESS: :8080
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fiber_template?sslmode=disable
      REDIS_URL: redis://:redis_password@localhost:6379/0
      NATS_URL: nats://localhost:4222
      FILE_SIGNING_KEY: ci-temporary-signing-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test -race -count=1 ./...

  swagger:
    name: Swagger
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup swag
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: Generate swagger
        run: make swagger
      - name: Verify swagger docs are up to date
        run: git diff --exit-code docs/

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: swagger
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
