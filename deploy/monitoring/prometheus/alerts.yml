groups:
  - name: fiber_v3_template
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum(rate(http_requests_total[5m])), 0.000001) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate (>5%)"
          description: "More than 5% of HTTP responses are 5xx in the last 5 minutes."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p95 latency above 1s"
          description: "95th percentile request duration exceeds 1 second."

      - alert: AppMetricsTargetDown
        expr: up{job="fiber-v3-template-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Application /metrics target is down"
          description: "Prometheus cannot scrape the app metrics endpoint."

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count{state="active"} > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL active connections above 90"
          description: "Active database connections are high, pool may be exhausted."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 85%"
          description: "Redis memory consumption is approaching the configured maximum."

      - alert: NATSConsumerLag
        expr: nats_jetstream_consumer_num_pending > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NATS JetStream consumer has >10k pending messages"
          description: "A JetStream consumer has significant pending message lag."
