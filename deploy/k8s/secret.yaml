apiVersion: v1
kind: Secret
metadata:
  name: fiber-template-secret
  namespace: fiber-template
type: Opaque
data:
  # Base64-encoded values only. Example:
  # echo -n 'postgres://user:pass@host:5432/db?sslmode=disable' | base64
  DATABASE_URL: "REPLACE_BASE64_ENCODED"
  REDIS_URL: "REPLACE_BASE64_ENCODED"
  NATS_URL: "REPLACE_BASE64_ENCODED"
  FILE_SIGNING_KEY: "REPLACE_BASE64_ENCODED"
