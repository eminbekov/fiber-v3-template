apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiber-template
  namespace: fiber-template
  labels:
    app.kubernetes.io/name: fiber-template
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fiber-template
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fiber-template
    spec:
      containers:
        - name: app
          image: ghcr.io/eminbekov/fiber-v3-template:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: fiber-template-config
            - secretRef:
                name: fiber-template-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
