# Full stack: app + data stores + observability (guide §19.3, §20.2)
# Run from repository root: docker compose -f deploy/docker/docker-compose.yml up --build -d

name: ${COMPOSE_PROJECT_NAME:-fiber-template}

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: ghcr.io/eminbekov/fiber-v3-template:local
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: info
      HTTP_LISTEN_ADDRESS: ":8080"
      GRPC_LISTEN_ADDRESS: ":9090"
      VIEWS_PATH: ./views
      CORS_ALLOW_ORIGINS: ""
      BODY_LIMIT: "4194304"
      OTEL_EXPORTER_ENDPOINT: otel-collector:4317
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-fiber_template}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:${REDIS_PORT:-6379}/0
      # [module:nats:start]
      NATS_URL: nats://${NATS_USER:-nats_user}:${NATS_PASSWORD:-nats_password}@nats:${NATS_PORT:-4222}
      # [module:nats:end]
      SESSION_DURATION: 24h
      STORAGE_TYPE: local
      STORAGE_LOCAL_BASE_PATH: ./uploads
      FILE_SIGNING_KEY: docker-dev-signing-key-change-in-production
      SIGNED_URL_TTL: 15m
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # [module:nats:start]
      nats:
        condition: service_started
      # [module:nats:end]
      # [module:monitoring:start]
      tempo:
        condition: service_started
      otel-collector:
        condition: service_started
      # [module:monitoring:end]

  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiber_template}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fiber_template}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine3.23
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # [module:nats:start]
  nats:
    image: nats:2.12.6-alpine
    command: ["--jetstream", "--user", "${NATS_USER:-nats_user}", "--pass", "${NATS_PASSWORD:-nats_password}", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
  # [module:nats:end]

  # [module:monitoring:start]
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    depends_on:
      app:
        condition: service_started

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    ports:
      - "3200:3200"
    volumes:
      - ../monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../monitoring/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml
    depends_on:
      tempo:
        condition: service_started

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-fiber_template}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.15.0
    command: ["-varz", "-jsz=all", "-connz", "-subz", "http://nats:8222"]
    ports:
      - "7777:7777"
    depends_on:
      nats:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
  # [module:monitoring:end]

volumes:
  postgres_data:
  uploads_data:
  # [module:monitoring:start]
  prometheus_data:
  loki_data:
  grafana_data:
  # [module:monitoring:end]
