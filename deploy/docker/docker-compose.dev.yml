services:
  postgres_dev:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiber_template}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fiber_template}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine3.23
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # [module:nats:start]
  nats:
    image: nats:2.12.6-alpine
    command: ["--jetstream", "--user", "${NATS_USER:-nats_user}", "--pass", "${NATS_PASSWORD:-nats_password}", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
  # [module:nats:end]

volumes:
  postgres_dev_data:
