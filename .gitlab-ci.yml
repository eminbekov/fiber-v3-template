stages:
  - lint
  - test
  - security
  - swagger
  - build
  - deploy

variables:
  GOPATH: /go
  CGO_ENABLED: "0"
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/fiber_template?sslmode=disable"
  REDIS_URL: "redis://redis:6379/0"
  NATS_URL: "nats://nats:4222"
  ENVIRONMENT: development
  LOG_LEVEL: info
  HTTP_LISTEN_ADDRESS: ":8080"
  FILE_SIGNING_KEY: ci-temporary-signing-key

lint:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run --timeout=5m ./...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  image: golang:1.26
  services:
    - name: postgres:18.3-alpine3.23
      alias: postgres
      variables:
        POSTGRES_DB: fiber_template
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
    - name: redis:8.6.2-alpine3.23
      alias: redis
    - name: nats:2.12.6-alpine
      alias: nats
      command: ["--jetstream"]
  script:
    - go test -race -count=1 ./...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

security:
  stage: security
  image: golang:1.26
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

swagger:
  stage: swagger
  image: golang:1.26
  script:
    - go install github.com/swaggo/swag/cmd/swag@latest
    - make swagger
    - git diff --exit-code docs/
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        docker build -t "$CI_REGISTRY_IMAGE:$VERSION" -t "$CI_REGISTRY_IMAGE:latest" -f deploy/docker/Dockerfile .
        docker push "$CI_REGISTRY_IMAGE:$VERSION"
        docker push "$CI_REGISTRY_IMAGE:latest"
      else
        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
        docker build -t "$CI_REGISTRY_IMAGE:main-$SHORT_SHA" -f deploy/docker/Dockerfile .
        docker push "$CI_REGISTRY_IMAGE:main-$SHORT_SHA"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$SERVER_USER@$SERVER_HOST" <<REMOTE
        cd $APP_DIR
        IMAGE_TAG=${IMAGE_TAG:-latest} docker compose -f deploy/docker/docker-compose.yml pull
        IMAGE_TAG=${IMAGE_TAG:-latest} docker compose -f deploy/docker/docker-compose.yml up -d
      REMOTE
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: production
