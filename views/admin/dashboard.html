{{define "admin/dashboard"}}
<section>
    <h1>{{.Title}}</h1>
    <p>{{call .T "dashboard.welcome_message"}}</p>
    <ul>
        <li>{{call .T "dashboard.users"}}: {{.Stats.UsersCount}}</li>
        <li>{{call .T "dashboard.open_sessions"}}: {{.Stats.SessionsOpen}}</li>
        <li>{{call .T "dashboard.last_updated"}}: {{formatDate .Stats.LastUpdated}}</li>
    </ul>
</section>
{{end}}
