{{define "admin/login"}}
<section style="max-width: 420px; margin: 0 auto;">
    <h1 style="margin-bottom: 1rem;">{{.Title}}</h1>
    {{if .ErrorMessage}}
    <p role="alert" style="color: #b00020; margin-bottom: 1rem;">{{.ErrorMessage}}</p>
    {{end}}
    <form method="post" action="/admin/login" style="display: flex; flex-direction: column; gap: 12px;">
        <label style="display: flex; flex-direction: column; gap: 4px;">
            <span>{{call .T "login.username"}}</span>
            <input name="username" type="text" autocomplete="username" required
                   style="padding: 8px; border: 1px solid #cccccc; border-radius: 4px;">
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
            <span>{{call .T "login.password"}}</span>
            <input name="password" type="password" autocomplete="current-password" required
                   style="padding: 8px; border: 1px solid #cccccc; border-radius: 4px;">
        </label>
        <button type="submit"
                style="margin-top: 8px; padding: 10px 16px; cursor: pointer; border-radius: 4px; border: 1px solid #333333; background: #333333; color: #ffffff;">
            {{call .T "login.submit"}}
        </button>
    </form>
</section>
{{end}}
