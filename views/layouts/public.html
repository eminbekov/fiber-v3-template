{{define "layouts/public"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #fafafa; color: #222222; min-height: 100vh; display: flex; flex-direction: column;">
    {{template "partials/public_header" .}}
    <main style="flex: 1; max-width: 960px; margin: 0 auto; padding: 32px 24px; width: 100%; box-sizing: border-box;">
        {{embed}}
    </main>
    {{template "partials/public_footer" .}}
</body>
</html>
{{end}}
