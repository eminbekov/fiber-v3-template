{{define "layouts/auth"}}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #f5f5f5;">
    <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">

        </div>
    </main>

</html>
