{{define "layouts/base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Admin Panel</title>
</head>
<body>
    {{template "partials/header" .}}
    <div style="display: flex; gap: 24px;">
        {{template "partials/sidebar" .}}
        <main style="flex: 1;">
            {{embed}}
        </main>
    </div>
    {{template "partials/footer" .}}
</body>
</html>
{{end}}
