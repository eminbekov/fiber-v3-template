root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./cmd/server/main.go"
  delay = 1000
  exclude_dir = ["bin", "tmp", "vendor", "docs", "deploy", "monitoring", "views", "migrations", "proto", "gen", "uploads"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
